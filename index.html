!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Swiss Classic World - Memory Challenge</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 10px;
  background: #0a0a0a;
  color: #d4af37;
  font-family: Arial, Helvetica, sans-serif;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  margin-top: 10px;
  margin-bottom: 5px;
  font-size: 32px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

#timer {
  font-size: 42px;
  font-weight: bold;
  color: white;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}

.card {
  position: relative;
  background: #1a1a1a;
  border: 2px solid #d4af37;
  border-radius: 14px;
  height: 180px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.2s ease;
}

.card:active {
  transform: scale(0.96);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
  padding: 6px;
}

.quest {
  font-size: 56px;
  color: #333;
  font-weight: bold;
}

.name-tag {
  display: none;
  color: white;
  font-size: 18px;
  font-weight: bold;
  text-transform: uppercase;
  padding: 10px;
  line-height: 1.2;
}

.card.flipped img,
.card.flipped .name-tag {
  display: block;
}

.card.flipped .quest {
  display: none;
}

.card.matched {
  border-color: #2ecc71;
  opacity: 0.35;
  pointer-events: none;
}

button {
  background: #d4af37;
  color: black;
  border: none;
  border-radius: 10px;
  padding: 18px 30px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

button:active {
  transform: scale(0.97);
}

#start-btn-container {
  margin-top: 25px;
}

#lead-form {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 92%;
  max-width: 600px;
  background: #1a1a1a;
  border: 3px solid #d4af37;
  border-radius: 18px;
  padding: 30px;
  z-index: 1000;
}

#lead-form h2 {
  color: white;
  font-size: 34px;
}

#stats {
  color: #d4af37;
  font-size: 28px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 18px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #444;
  background: #222;
  color: white;
  font-size: 18px;
}

#admin-panel {
  margin-top: 40px;
  padding-bottom: 40px;
}

.admin-btn {
  background: #222;
  color: #ccc;
  border: 1px solid #444;
  margin: 6px;
  font-size: 16px;
}

.hidden {
  display: none !important;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .card {
    height: 150px;
  }
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .card {
    height: 140px;
  }

  h1 {
    font-size: 24px;
  }

  #timer {
    font-size: 30px;
  }
}
</style>
</head>

<body>

<h1>🏆 Classic Car Challenge</h1>
<div id="timer">Zeit: 0s</div>

<div class="grid" id="grid"></div>

<div id="start-btn-container">
  <button id="start-btn">Jetzt starten</button>
</div>

<div id="lead-form">
  <h2>🔥 Gratulation!</h2>
  <p id="stats"></p>
  <p style="color:#ccc;">Bitte Daten eingeben:</p>

  <input type="text" id="fname" placeholder="Vorname & Nachname" />
  <input type="email" id="femail" placeholder="E-Mail Adresse" />
  <input type="number" id="fage" placeholder="Alter" />

  <button id="save-btn">Daten absenden</button>
</div>

<div id="admin-panel">
  <button class="admin-btn" onclick="downloadCSV()">CSV Download</button>
  <button class="admin-btn" onclick="clearData()">Alle Daten löschen</button>
</div>

<script>
const cars = [
  { name: 'Aston Martin DB MK III', img: 'db24.jpg' },
  { name: 'Aston Martin DB4', img: 'db4.jpg' },
  { name: 'Aston Martin V8 Volante', img: 'v8.jpg' },
  { name: 'Jaguar S.S. 1.5 Litre', img: 'ss15.jpg' },
  { name: 'Jaguar XJ-SC V12', img: 'xjsc.jpg' },
  { name: 'Jaguar XK 120 DHC', img: 'xk120.jpg' },
  { name: 'Jaguar XKR S/C Coupé', img: 'xkr.jpg' },
  { name: 'Range Rover 4.0', img: 'range.jpg' },
  { name: 'Maserati 3500 GT', img: 'maserati.jpg' },
  { name: 'Mercedes-Benz 300 CE', img: 'mercedes.jpg' },
  { name: 'Morgan Plus 8', img: 'morgan.jpg' },
  { name: 'Rover P6 2000 TC', img: 'rover.jpg' }
];

let flippedCards = [];
let matches = 0;
let seconds = 0;
let timerInterval;
let gameStarted = false;
let lockBoard = false;
let attempts = 0;

const startBtn = document.getElementById('start-btn');
const saveBtn = document.getElementById('save-btn');

startBtn.addEventListener('click', startGame);
saveBtn.addEventListener('click', saveData);

function startGame() {
  if(gameStarted) return;

  gameStarted = true;
  matches = 0;
  seconds = 0;
  attempts = 0;
  flippedCards = [];

  document.getElementById('start-btn-container').classList.add('hidden');

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let gameItems = [];

  const selection = [...cars]
    .sort(() => Math.random() - 0.5)
    .slice(0, 6);

  selection.forEach(car => {
    gameItems.push({ type: 'img', id: car.name, img: car.img });
    gameItems.push({ type: 'name', id: car.name, text: car.name });
  });

  gameItems.sort(() => Math.random() - 0.5);

  gameItems.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item.id;

    if(item.type === 'img') {
      card.innerHTML = `
        <img src="${item.img}" alt="${item.id}">
        <span class="quest">?</span>
      `;
    } else {
      card.innerHTML = `
        <div class="name-tag">${item.text}</div>
        <span class="quest">?</span>
      `;
    }

    card.addEventListener('click', () => flipCard(card), { passive: true });
    card.addEventListener('touchstart', () => flipCard(card), { passive: true });

    grid.appendChild(card);
  });

  updateTimer();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    updateTimer();
  }, 1000);
}

function updateTimer() {
  document.getElementById('timer').innerText = `Zeit: ${seconds}s`;
}

function flipCard(card) {
  if(lockBoard) return;
  if(card.classList.contains('flipped')) return;
  if(card.classList.contains('matched')) return;

  card.classList.add('flipped');
  flippedCards.push(card);

  if(flippedCards.length === 2) {
    attempts++;
    lockBoard = true;
    setTimeout(checkMatch, 800);
  }
}

function checkMatch() {
  const [card1, card2] = flippedCards;

  if(card1.dataset.id === card2.dataset.id) {
    card1.classList.add('matched');
    card2.classList.add('matched');

    matches++;

    if(matches === 6) {
      clearInterval(timerInterval);
      showLeadForm();
    }
  } else {
    card1.classList.remove('flipped');
    card2.classList.remove('flipped');
  }

  flippedCards = [];
  lockBoard = false;
}

function showLeadForm() {
  document.getElementById('stats').innerHTML = `
    ${seconds} Sekunden<br>
    ${attempts} Versuche
  `;

  document.getElementById('lead-form').style.display = 'block';
}

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email);
}

function getBrowserInfo() {
  return navigator.userAgent;
}

function saveData() {
  const name = document.getElementById('fname').value.trim();
  const email = document.getElementById('femail').value.trim();
  const age = document.getElementById('fage').value.trim();

  if(!name || !email || !age) {
    alert('Bitte alle Felder ausfüllen.');
    return;
  }

  if(!validateEmail(email)) {
    alert('Bitte gültige E-Mail Adresse eingeben.');
    return;
  }

  const entry = {
    id: Date.now(),
    name,
    email,
    age,
    time: seconds,
    attempts,
    browser: getBrowserInfo(),
    device: navigator.platform,
    date: new Date().toLocaleString('de-CH')
  };

  const allEntries = JSON.parse(localStorage.getItem('messe_leads') || '[]');

  allEntries.push(entry);

  localStorage.setItem('messe_leads', JSON.stringify(allEntries));

  alert('Teilnehmer gespeichert. Viel Glück!');

  location.reload();
}

function escapeCSV(value) {
  return '"' + String(value).replace(/"/g, '""') + '"';
}

function downloadCSV() {
  const data = JSON.parse(localStorage.getItem('messe_leads') || '[]');

  if(data.length === 0) {
    alert('Keine Daten vorhanden.');
    return;
  }

  let csv = '\uFEFF';
  csv += 'Datum;Name;Email;Alter;Zeit (Sek.);Versuche;Gerät;Browser\n';

  data.forEach(entry => {
    csv += [
      escapeCSV(entry.date),
      escapeCSV(entry.name),
      escapeCSV(entry.email),
      escapeCSV(entry.age),
      escapeCSV(entry.time),
      escapeCSV(entry.attempts),
      escapeCSV(entry.device),
      escapeCSV(entry.browser)
    ].join(';') + '\n';
  });

  const blob = new Blob([csv], {
    type: 'text/csv;charset=utf-8;'
  });

  if(window.navigator.msSaveBlob) {
    window.navigator.msSaveBlob(blob, 'SwissClassicWorld_Teilnehmer.csv');
  } else {
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);

    link.href = url;
    link.download = 'SwissClassicWorld_Teilnehmer.csv';

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
  }
}

function clearData() {
  const confirmDelete = confirm(
    'ACHTUNG: Alle Teilnehmerdaten werden gelöscht!'
  );

  if(confirmDelete) {
    localStorage.removeItem('messe_leads');
    alert('Daten gelöscht.');
    location.reload();
  }
}
</script>

</body>
</html>
